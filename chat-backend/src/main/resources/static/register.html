<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px;">

        <h3 class="text-center mb-3">Đăng ký</h3>

        <!-- USERNAME -->
        <input id="username" class="form-control mb-2" placeholder="Tên người dùng">

        <!-- EMAIL -->
        <input id="email" class="form-control mb-2" placeholder="Email">

        <!-- PASSWORD -->
        <div class="input-group mb-2">
            <input id="password" type="password" class="form-control" placeholder="Mật khẩu">

            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePassword('password', this)">
                <span class="eye-icon">👁️</span>
            </button>
        </div>

        <!-- REGISTER BUTTON -->
        <button class="btn btn-success w-100" onclick="register()">
            Đăng ký
        </button>

        <!-- ERROR TEXT -->
        <p id="registerError" class="text-danger text-center mt-2"></p>

        <!-- LINK BACK LOGIN -->
        <p class="text-center mt-3">
            Đã có tài khoản?
            <a href="/login.html" class="text-primary text-decoration-none">
                Đăng nhập
            </a>
        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
